    <script>
        const md = "# Hercules \u2014 pSEO Strategy: High-Intent Targeting\n**\"Build your own custom software.\"** \u2014 audience already ready to spend.\n\n---\n\n## 1. Matrix: Targeting Strategy\n\nThree URL tracks. Each targets a different stage of the buyer journey.\n\n```\n/build-software/\n\u2514\u2500\u2500 {industry}                   \"Build Custom Software for {Industry}\"\n    \u2514\u2500\u2500 {tool}                   \"Build Custom {Tool} for {Industry}\"\n\n/best-software/\n\u2514\u2500\u2500 {industry}                   \"Best Software for {Industry}\"\n    \u2514\u2500\u2500 {tool}                   \"Best {Tool} Software for {Industry}\"\n\n/alternatives/\n\u2514\u2500\u2500 {competitor}                 \"{Competitor} Alternatives\"\n    \u2514\u2500\u2500 {industry}               \"Best {Competitor} Alternatives for {Industry}\"\n        \u2514\u2500\u2500 {tool}               \"Best {Competitor} Alternative for {Tool} in {Industry}\"\n```\n\n| Track | Intent | Page Type | Searcher State | Conversion |\n|-------|--------|-----------|----------------|------------|\n| `/build-software/` | **Informational** | Use-case landing page \u2014 Hercules features, benefits, testimonials, live demo CTA | Aware of the problem, exploring solutions | High |\n| `/best-software/` | **Commercial** | Listicle \u2014 top tools ranked with pros, cons, pricing, feature comparison table | Evaluating options, not yet committed | Medium |\n| `/alternatives/` | **Transactional** | Head-to-head \u2014 competitor vs other alternatives first, then competitor vs Hercules as the final showdown | Done with the incumbent, wallet open | Highest |\n\n**Core message on every page:**\n> You didn't start a generic business. Stop using generic software.\n> Build your own custom {tool} \u2014 built for {industry}, powered by AI, ready in minutes.\n\n### Page Structure by Track\n\n**`/build-software/{industry}/{tool}`** \u2014 Informational\nHero \u2192 Problem statement \u2192 How Hercules solves it \u2192 Feature breakdown (industry-specific framing) \u2192 Live demo \u2192 Testimonials \u2192 CTA\n\n**`/best-software/{industry}/{tool}`** \u2014 Commercial\nIntro \u2192 Ranked list of top tools (including Hercules) \u2192 Pros/cons per tool \u2192 Pricing table \u2192 Feature comparison matrix \u2192 Verdict \u2192 CTA\n\n**`/alternatives/{competitor}/{industry}/{tool}`** \u2014 Transactional\nWhy people leave {competitor} \u2192 Top alternatives ranked \u2192 Head-to-head between alternatives \u2192 Final showdown: {competitor} vs Hercules \u2192 Hercules wins on customization, speed, price \u2192 CTA\n\n### Competitor Types\n\n**Vertical** (Table 1) \u2014 industry-specific incumbents. Searcher knows the product by name, actively fleeing it.\n`/alternatives/cloudbeds/hotel/property-management`\n`/alternatives/procore/construction/project-management`\n\n**Horizontal** (Table 2) \u2014 cross-industry tools. Applies to all 53 industries.\n`/alternatives/monday/construction/project-management`\n`/alternatives/salesforce/law-firm/crm`\n\n---\n\n## 2. Summary\n\n| Dimension | Count | Source |\n|-----------|-------|--------|\n| Industries | 53 | Table 1 |\n| Avg specialized tools per industry | ~4.5 | Table 1 |\n| Total vertical tool pages (unique) | ~239 | 53 \u00d7 4.5 |\n| Horizontal tool categories | 31 | Table 2 |\n| Vertical competitors (unique) | ~150 | Table 1, some overlap |\n| Horizontal competitors (unique) | ~50 | Table 2, heavy overlap |\n| **Total unique competitors** | **~200** | |\n\n---\n\n## 3. Page Count \u2014 English Only\n\n### Build & Best Tracks\n\n| Layer | Formula | Pages |\n|-------|---------|-------|\n| `/build-software/{industry}` | 53 | **53** |\n| `/build-software/{industry}/{tool}` \u2014 vertical | 53 \u00d7 4.5 | **239** |\n| `/build-software/{industry}/{tool}` \u2014 horizontal | 53 \u00d7 31 | **1,643** |\n| `/best-software/{industry}` | 53 | **53** |\n| `/best-software/{industry}/{tool}` \u2014 vertical | 53 \u00d7 4.5 | **239** |\n| `/best-software/{industry}/{tool}` \u2014 horizontal | 53 \u00d7 31 | **1,643** |\n| **Subtotal** | | **3,870** |\n\n### Alternatives Track\n\nSplit by competitor type \u2014 vertical and horizontal behave very differently.\n\n**Vertical competitors** are industry-specific. Cloudbeds only competes in Hotel. Procore only in Construction. So each vertical competitor maps to 1\u20132 industries max.\n\n| Layer | Formula | Pages |\n|-------|---------|-------|\n| `/alternatives/{vertical-competitor}` | ~150 unique vertical competitors | **150** |\n| `/alternatives/{vertical-competitor}/{industry}` | 53 industries \u00d7 4 competitors each = 212 pairs | **212** |\n| `/alternatives/{vertical-competitor}/{industry}/{tool}` | 212 pairs \u00d7 avg 4.5 tools | **~954** |\n| **Vertical subtotal** | | **~1,316** |\n\n**Horizontal competitors** serve all industries. Monday.com, Salesforce, HubSpot \u2014 they compete everywhere. So each horizontal competitor gets a page for every industry \u00d7 every tool.\n\n| Layer | Formula | Pages |\n|-------|---------|-------|\n| `/alternatives/{horizontal-competitor}` | ~50 unique horizontal competitors | **50** |\n| `/alternatives/{horizontal-competitor}/{industry}` | 50 competitors \u00d7 53 industries | **2,650** |\n| `/alternatives/{horizontal-competitor}/{industry}/{tool}` | 50 \u00d7 53 \u00d7 avg 4 relevant tools per combo | **~10,600** |\n| **Horizontal subtotal** | | **~13,300** |\n\n| | Pages |\n|--|-------|\n| Vertical alternatives | ~1,316 |\n| Horizontal alternatives | ~13,300 |\n| **Alternatives total** | **~14,616** |\n\n### Grand Total\n\n| | Pages |\n|--|-------|\n| Build & Best tracks | 3,870 |\n| Alternatives \u2014 vertical | 1,316 |\n| Alternatives \u2014 horizontal | 13,300 |\n| **Total (English only)** | **~18,486** |\n| \u00d7 languages (est. 10) | | **~185,000** |\n| \u00d7 city layer | | **millions** |\n\n> The horizontal alternatives track dominates \u2014 13K pages because Monday, Salesforce, HubSpot etc. are relevant to every single industry. One competitor \u00d7 53 industries \u00d7 tools = hundreds of pages per competitor. And every visitor landed here by typing a competitor's name \u2014 they're already walking out the door.\n\n---\n\n## 4. Top 12 Industries to Pick\n\nRanked by: number of tools needed \u00d7 willingness to pay \u00d7 current software fragmentation. These industries run on 5\u201310 separate tools today and pay dearly for each.\n\n| # | Industry | Why High Value | Tools Needed |\n|---|----------|----------------|--------------|\n| 1 | **Hospital & Specialist** | Most complex ops, highest software spend in any sector | EHR, billing, ward management, lab, patient portal, scheduling, compliance |\n| 2 | **Construction & Contractor** | Every project needs its own system, fragmented stack | Bid management, scheduling, RFIs, budget, fleet, field reports, payroll |\n| 3 | **Manufacturing** | Multi-department ops, no single tool fits all | Production planning, BOM, work orders, quality control, inventory, payroll |\n| 4 | **Logistics & Courier** | Real-time ops, driver + client + warehouse all need tools | Dispatch, route optimization, POD, live tracking, fleet, invoicing |\n| 5 | **IT Services & MSP** | Tool-native buyers, pay monthly per client seat | Ticketing, RMM, PSA, client management, time tracking, billing |\n| 6 | **Law Firm** | Time = money, every minute tracked, high billing rates | Case management, time tracking, client portal, billing, document management |\n| 7 | **Property Management** | Ongoing ops across multiple properties | Tenant portal, maintenance, rent collection, inspections, accounting, lease management |\n| 8 | **Trucking & Freight** | Federal compliance + logistics = multiple mandatory systems | Load management, ELD/DOT compliance, driver logs, fleet, invoicing |\n| 9 | **Real Estate Agency** | Leads + listings + deals + agents = fragmented | CRM, listings, deal pipeline, agent commission, document signing, marketing |\n| 10 | **Accounting Firm** | Client-heavy, deadline-driven, compliance-bound | Client management, tax workflow, document portal, billing, time tracking |\n| 11 | **Home Care / NDIS** | Government funding = reporting requirements | Care plans, shift scheduling, funding tracker, incident reports, billing, compliance |\n| 12 | **Hotel & Hostel** | Multi-channel revenue, guest experience, daily ops | PMS, channel manager, revenue management, guest portal, housekeeping, F&B |\n\n---\n\n## 5. Tables (For Reference Only)\n\n### Table 1 \u2014 Industry-Specific Tools & Vertical Competitors\n\n| Industry | Industry-Specific Tool Categories | Vertical Competitors |\n|----------|-----------------------------------|----------------------|\n| Hotel & Hostel | Property Management (PMS), Channel Manager, Revenue Management, Guest Portal | Cloudbeds, Mews, Oracle Hospitality, Little Hotelier |\n| Restaurant & Cafe | POS, Table Management, Kitchen Display, Reservation System | Toast, Square Restaurants, Lightspeed, TouchBistro |\n| Dental Clinic | Practice Management, Patient Records, Treatment Planning | Dentrix, Eaglesoft, Curve Dental, Carestream |\n| Medical / GP Clinic | EHR, Patient Portal, Billing & Claims | athenahealth, Kareo, DrChrono, eClinicalWorks |\n| Hospital & Specialist | Clinical Management, Ward Management, Bed Tracking, Lab Orders | Epic, Cerner, Meditech, Allscripts |\n| Veterinary | Practice Management, Pet Records, Vaccination Tracker | Covetrus, ImproMed, AVImark, EzyVet |\n| Pharmacy | Prescription Management, Drug Inventory, Patient Profiles | PioneerRx, Liberty Software, PrimeRx, BestRx |\n| Optometry | Patient Records, Exam Workflow, Eyewear POS | Eyefinity, RevolutionEHR, Crystal PM, Compulink |\n| Mental Health | Session Notes, Treatment Plans, Telehealth, Insurance Billing | SimplePractice, TherapyNotes, TheraNest, IntakeQ |\n| Chiropractor | SOAP Notes, Adjustment Tracking, Billing | ChiroTouch, Jane App, Genesis Chiropractic, Eclipse |\n|         marked.setOptions({ breaks: true, gfm: true });

        // Parse the full markdown
        const raw = marked.parse(md);

        // Split into sections by h2
        const tmp = document.createElement('div');
        tmp.innerHTML = raw;

        const container = document.getElementById('sections');
        let currentSection = null;
        let sectionIndex = 0;

        const sectionLabels = [
            '01 — Matrix: Targeting Strategy',
            '02 — Summary',
            '03 — Page Count',
            '04 — Top 12 Industries',
            '05 — Tables: For Reference'
        ];

        Array.from(tmp.childNodes).forEach(node => {
            if (node.nodeName === 'H1') return; // skip — already in cover
            if (node.nodeName === 'H2') {
                currentSection = document.createElement('div');
                currentSection.className = 'section';

                const label = document.createElement('div');
                label.className = 'section-label';
                label.textContent = sectionLabels[sectionIndex] || node.textContent;
                sectionIndex++;

                const title = document.createElement('h2');
                title.className = 'section-title';
                // Strip the "1. " numbering from h2 text
                title.innerHTML = node.innerHTML.replace(/^\d+\.\s+/, '').replace(/—/, '<em>—</em>');

                currentSection.appendChild(label);
                currentSection.appendChild(title);
                container.appendChild(currentSection);
            } else if (node.nodeName === 'HR') {
                // skip
            } else {
                if (!currentSection) {
                    currentSection = document.createElement('div');
                    currentSection.className = 'section';
                    container.appendChild(currentSection);
                }
                if (node.nodeType !== 3 || node.textContent.trim()) {
                    currentSection.appendChild(node.cloneNode(true));
                }
            }
        });

        // Intersection Observer for scroll animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                    entry.target.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.05 });

        document.querySelectorAll('.section').forEach(s => {
            s.style.transform = 'translateY(20px)';
            observer.observe(s);
        });
    </script>
